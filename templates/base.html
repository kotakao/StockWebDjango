{% load django_vite %}
<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}StockWeb{% endblock %}</title>
  {% vite_hmr_client %}
  {% vite_asset 'src/main.js' %}
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
      <a class="navbar-brand" href="{% url 'dashboard:index' %}">StockWeb</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
              data-bs-target="#mainNav" aria-controls="mainNav"
              aria-expanded="false" aria-label="切換導覽">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link{% if request.resolver_match.view_name == 'dashboard:index' %} active{% endif %}"
               {% if request.resolver_match.view_name == 'dashboard:index' %}aria-current="page"{% endif %}
               href="{% url 'dashboard:index' %}">首頁</a>
          </li>
          <li class="nav-item">
            <a class="nav-link{% if request.resolver_match.view_name == 'stocks:query' %} active{% endif %}"
               {% if request.resolver_match.view_name == 'stocks:query' %}aria-current="page"{% endif %}
               href="{% url 'stocks:query' %}">查詢個股</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-3">
    {% block content %}{% endblock %}
  </main>

  <footer class="container py-3 text-muted">
    <small>資料由 StockDCBot 於每交易日 17:00 後更新。</small>
  </footer>
</body>
</html>
